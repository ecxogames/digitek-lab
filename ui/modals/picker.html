<modal width="430" height="270" blur="true" closeable="true" titlebar="false">
    <titlebar value="false" height="40">
        <div style="position:relative;height:100%;background:rgba(255,255,255,0.35);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:space-between;font-family:'Roboto','Segoe UI',sans-serif;user-select:none;">
            <div style="position:absolute;inset:0;cursor:move;z-index:0;" onmousedown="if(window.dragWindow) window.dragWindow('')"></div>
            <div style="position:relative;z-index:1;display:flex;align-items:center;gap:9px;padding-left:14px;pointer-events:none;">
                <div style="width:20px;height:20px;border-radius:6px;display:grid;place-items:center;background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.45);color:rgba(99,102,241,1);font-size:13px;font-weight:700;">≡</div>
                <span id="tb-label" style="font-size:12px;font-weight:600;color:rgba(0,0,0,0.6);">Select</span>
            </div>
            <button onclick="Cancel()" title="Close" style="position:relative;z-index:1;width:44px;height:40px;border:none;background:transparent;color:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s ease;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='rgba(0,0,0,0.45)'">
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>
            </button>
        </div>
    </titlebar>

    <title><value>Select</value></title>

    <content>
        <div style="display:flex;flex-direction:column;justify-content:space-between;align-items:stretch;height:100%;width:100%;background:#DCDCDC;color:rgba(0,0,0,0.85);font-family:'Roboto','Segoe UI',sans-serif;padding:22px;box-sizing:border-box;">
            <div>
                <h2 id="p-title" style="margin:0 0 8px;font-size:16px;line-height:1.2;font-weight:600;color:rgba(0,0,0,0.85);">Choose one</h2>
                <p id="p-message" style="margin:0 0 12px;font-size:13px;line-height:1.5;color:rgba(0,0,0,0.55);"></p>
            </div>
            <select id="p-select" style="width:100%;box-sizing:border-box;padding:10px 12px;background:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.6);border-radius:8px;color:rgba(0,0,0,0.85);font-size:13px;font-family:inherit;outline:none;margin-bottom:14px;"></select>
            <div style="display:flex;gap:8px;justify-content:flex-end;">
                <button onclick="Cancel()" style="display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:12px;font-size:13px;font-weight:500;border:1px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.4);color:rgba(0,0,0,0.7);cursor:pointer;transition:all 0.2s ease;" onmouseover="this.style.background='rgba(255,255,255,0.6)'" onmouseout="this.style.background='rgba(255,255,255,0.4)'">Cancel</button>
                <button onclick="Submit()" id="p-ok" style="display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:12px;font-size:13px;font-weight:500;border:1px solid rgba(99,102,241,0.45);background:rgba(99,102,241,0.25);color:rgba(99,102,241,1);cursor:pointer;transition:all 0.2s ease;" onmouseover="this.style.background='rgba(99,102,241,0.4)'" onmouseout="this.style.background='rgba(99,102,241,0.25)'">Open</button>
            </div>
        </div>
    </content>

    <script>
        const p = window.__esd_payload || {};
        if (p.title)   document.getElementById('p-title').textContent = p.title;
        if (p.message) document.getElementById('p-message').textContent = p.message;
        if (p.tbLabel) document.getElementById('tb-label').textContent = p.tbLabel;
        if (p.confirmLabel) document.getElementById('p-ok').textContent = p.confirmLabel;

        const sel = document.getElementById('p-select');
        (p.options || []).forEach(o => {
            const opt = document.createElement('option');
            opt.value = (typeof o === 'object') ? o.value : o;
            opt.textContent = (typeof o === 'object') ? (o.label || o.value) : o;
            sel.appendChild(opt);
        });
        sel.focus();

        function Submit() { closeModal(sel.value || null); }
        function Cancel() { closeModal(null); }
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') Submit();
            else if (event.key === 'Escape') Cancel();
        });
    </script>
</modal>
