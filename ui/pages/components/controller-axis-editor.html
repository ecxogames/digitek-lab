  <script>
    const PARTS={left_stick:{label:'Left Stick',icon:'sports_esports',axes:[0,1],kind:'stick'},right_stick:{label:'Right Stick',icon:'sports_esports',axes:[2,3],kind:'stick'},left_trigger:{label:'Left Trigger',icon:'vertical_align_bottom',button:6,axis:6,kind:'trigger'},right_trigger:{label:'Right Trigger',icon:'vertical_align_bottom',button:7,axis:7,kind:'trigger'}};
